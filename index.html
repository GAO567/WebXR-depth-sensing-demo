<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Quest 3 WebXR Depth Sensing - Fixed V2</title>
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <style>
        .ar-hint {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: white;
            font-family: Arial, sans-serif;
            z-index: 10;
            pointer-events: none;
            background-color: rgba(0,0,0,0.5);
            padding: 5px;
        }
    </style>
</head>
<body>
    <div class="ar-hint">请使用 HTTPS，点击右下角 AR 按钮。确保光线充足，不要对着白墙。</div>

    <script>
        const questDepthControllerDef = {
            schema: {
                eye: { type: 'string', default: 'left' },
                width: { type: 'number', default: 0.8 },
                height: { type: 'number', default: 0.6 },
                nearClip: { type: 'number', default: 0.05 },
                farClip: { type: 'number', default: 5.0 },
                whiteDistance: { type: 'number', default: 2.0 },
                invalidColor: { type: 'color', default: '#a6a6a6' }
            },

            applyEyeSetting: function () {
                const eye = (this.data.eye || 'left').toLowerCase();
                this.selectedEyeLayer = eye === 'right' ? 1.0 : 0.0;
                if (this.depthMaterial) {
                    this.depthMaterial.uniforms.uEyeLayer.value = this.selectedEyeLayer;
                }
            },

            updatePlaneSize: function () {
                if (!this.mesh) return;
                const width = Number.isFinite(this.data.width) ? this.data.width : 0.8;
                const height = Number.isFinite(this.data.height) ? this.data.height : 0.6;
                this.mesh.geometry.dispose();
                this.mesh.geometry = new THREE.PlaneGeometry(width, height);
            },

            updateDepthParams: function () {
                if (!this.depthMaterial) return;
                const nearClip = Number.isFinite(this.data.nearClip) && this.data.nearClip > 0
                    ? this.data.nearClip
                    : 0.05;
                const farClip = Number.isFinite(this.data.farClip) && this.data.farClip > nearClip
                    ? this.data.farClip
                    : Math.max(nearClip + 0.001, 5.0);
                const whiteDistance = Number.isFinite(this.data.whiteDistance)
                    ? Math.min(Math.max(this.data.whiteDistance, nearClip), farClip)
                    : 2.0;

                this.depthMaterial.uniforms.uNearClip.value = nearClip;
                this.depthMaterial.uniforms.uFarClip.value = farClip;
                this.depthMaterial.uniforms.uWhiteDistance.value = whiteDistance;
            },

            updateInvalidColor: function () {
                if (!this.depthMaterial) return;
                const color = new THREE.Color(this.data.invalidColor || '#a6a6a6');
                this.depthMaterial.uniforms.uInvalidColor.value.copy(color);
            },



            init: function () {
                const sceneEl = this.el.sceneEl;
                const webxrSystem = sceneEl.systems.webxr;

                // --- 1. 核心修复：更健壮的系统初始化 ---
                // 我们不再手动 setAttribute 'webxr'，因为这可能导致异步竞争问题。
                // 而是直接在系统中注入配置。

                // A-Frame 会自动将我们声明的 feature 添加到 session 中。
                webxrSystem.sessionConfiguration.optionalFeatures.push('depth-sensing');
                
                // 配置深度感知参数
                webxrSystem.sessionConfiguration.depthSensing = {
                    usagePreference: ["gpu-optimized"],
                    dataFormatPreference: ["unsigned-short"], // 使用 16 位整数
                    matchDepthView: true 
                };

                // 在 scene loaded 之前强制同步一下（A-Frame 1.7 必需补丁）
                // 我们在组件 init 时就必须确保配置已写入，防止 session 启动时漏掉。
                
                // --- 2. 创建深度可视化着色器 (整数采样) ---
                this.depthMaterial = new THREE.ShaderMaterial({
                    uniforms: {
                        uDepthTexture: { value: null }, // 每帧更新
                        // 线性化参数（单位：米）
                        uNearClip: { value: 0.05 },
                        uFarClip: { value: 5.0 },
                        uWhiteDistance: { value: 2.0 },
                        uEyeLayer: { value: 0.0 },
                        uInvalidColor: { value: new THREE.Color('#a6a6a6') }
                    },
                    vertexShader: `
                        out vec2 vUv;
                        void main() {
                            vUv = uv;
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                        }
                    `,
                    fragmentShader: `
    precision highp float;
    precision highp sampler2DArray;

    in vec2 vUv;
    uniform sampler2DArray uDepthTexture;
    uniform float uEyeLayer;
    uniform float uNearClip;
    uniform float uFarClip;
    uniform float uWhiteDistance;
    uniform vec3 uInvalidColor;
    out vec4 pc_FragColor;

    void main() {
        // 1. 获取深度原始值
        float depthRaw = texture(uDepthTexture, vec3(vUv, uEyeLayer)).r;
        
        float nearClip = max(uNearClip, 0.001);
        float farClip = max(uFarClip, nearClip + 0.001);
        float whiteDistance = clamp(uWhiteDistance, nearClip, farClip);
        bool isInvalid = (depthRaw <= 0.00001) || (depthRaw >= 0.9999);
        
        // 2. 无效深度显示为指定颜色
        if (isInvalid) {
            pc_FragColor = vec4(uInvalidColor, 1.0);
        } else {
            // 3. 将非线性深度线性化到米空间
            float zNdc = depthRaw * 2.0 - 1.0;
            float linearDepth = (2.0 * nearClip * farClip) /
                (farClip + nearClip - zNdc * (farClip - nearClip));

            // 4. 超过 whiteDistance（米）显示白色
            if (linearDepth >= whiteDistance) {
                pc_FragColor = vec4(1.0, 1.0, 1.0, 1.0);
            } else {
                // 5. 线性映射亮度：近处黑，远处灰
                float brightness = clamp((linearDepth - nearClip) / (whiteDistance - nearClip), 0.0, 1.0);
                pc_FragColor = vec4(vec3(brightness), 1.0);
            }
        }
    }
`,
                     glslVersion: THREE.GLSL3, // 确保使用 WebGL 2 (ES 3.0)
                    side: THREE.DoubleSide
                });

                // --- 3. 创建 Three.js 平面并注入 A-Frame ---
                const geometry = new THREE.PlaneGeometry(this.data.width, this.data.height);
                this.mesh = new THREE.Mesh(geometry, this.depthMaterial);
                
                // 位置由挂载该组件的 a-entity 的 position/rotation/scale 控制
                this.mesh.position.set(0, 0, 0);
                
                this.el.setObject3D('depthPreview', this.mesh);

                this.applyEyeSetting();
                this.updatePlaneSize();
                this.updateDepthParams();
                this.updateInvalidColor();
            },

            update: function () {
                this.applyEyeSetting();
                this.updatePlaneSize();
                this.updateDepthParams();
                this.updateInvalidColor();
            },

            tick: function () {
                const renderer = this.el.sceneEl.renderer;
                if (!renderer.xr.enabled) return;

                // --- 4. 每帧更新深度纹理 ---
                const depthTexture = renderer.xr.getDepthTexture();
                
                if (depthTexture) {
                    // 如果成功获取到纹理，我们就更新 Shader 的 Uniform
                    this.depthMaterial.uniforms.uDepthTexture.value = depthTexture;
                    this.depthMaterial.uniforms.uEyeLayer.value = this.selectedEyeLayer;
                    
                    // 核心补丁：确保 Three.js 将这个纹理作为 DataTexture2DArray 绑定
                    // 这对于 unsigned-short 格式非常重要
                    if (depthTexture.isDataTexture2DArray === undefined) {
                        depthTexture.isDataTexture2DArray = true;
                    }
                }
            }
        };

           // 仅保留一个组件名
        AFRAME.registerComponent('quest-depth-controller', questDepthControllerDef);
    </script>

    <a-scene  xr-mode-ui="XRMode: ar;">
        <a-entity camera position="0 1.6 0">
             <a-entity position="-0.4 0 -1" quest-depth-controller="eye: left; width: 0.8; height: 0.6; nearClip: 0.05; farClip: 5.0; whiteDistance: 2.0; invalidColor: #00ffff">  </a-entity>
             <a-entity position="0.4 0 -1" quest-depth-controller="eye: right; width: 0.8; height: 0.6; nearClip: 0.05; farClip: 5.0; whiteDistance: 2.0; invalidColor: #ff00ff">  </a-entity>
        </a-entity>
        
        <a-light type="ambient" color="#FFF"></a-light>
    </a-scene>

</body>
</html>
